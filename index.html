
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css"></link>
<title>Scientific Calculator</title>


</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button onclick="deleteLast()">DEL</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="square()">x²</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="sqrt()">√</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="power()">xʸ</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="pi()">π</button>
        <button onclick="append('%')">%</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button onclick="log()">log</button>
        <button onclick="ln()">ln</button>

    </div>
</div>

<script>

const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function sqrt(){
    try{
        display.value = Math.sqrt(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

function square(){
    try{
        let num = eval(display.value);
        display.value = num * num;
    }
    catch{
        display.value = "Error";
    }
}

function power(){
    append("**");
}

function pi(){
    display.value += Math.PI;
}

function sin(){
    try{
        display.value = Math.sin(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function cos(){
    try{
        display.value = Math.cos(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function tan(){
    try{
        display.value = Math.tan(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function log(){
    try{
        display.value = Math.log10(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

function ln(){
    try{
        display.value = Math.log(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
