<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.calculator{
    width:420px;
    background:#1f2937;
    border-radius:20px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.display{
    width:100%;
    height:80px;
    border:none;
    border-radius:15px;
    background:#111827;
    color:white;
    font-size:2rem;
    text-align:right;
    padding:15px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    background:#374151;
    color:white;
    font-size:1.1rem;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.operator{
    background:#2563eb;
}

.equal{
    background:#16a34a;
}

.clear{
    background:#dc2626;
}
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button onclick="deleteLast()">DEL</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="square()">x²</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="sqrt()">√</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="power()">xʸ</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="pi()">π</button>
        <button onclick="append('%')">%</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button onclick="log()">log</button>
        <button onclick="ln()">ln</button>

    </div>
</div>

<script>

const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function sqrt(){
    try{
        display.value = Math.sqrt(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

function square(){
    try{
        let num = eval(display.value);
        display.value = num * num;
    }
    catch{
        display.value = "Error";
    }
}

function power(){
    append("**");
}

function pi(){
    display.value += Math.PI;
}

function sin(){
    try{
        display.value = Math.sin(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function cos(){
    try{
        display.value = Math.cos(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function tan(){
    try{
        display.value = Math.tan(eval(display.value) * Math.PI / 180);
    }
    catch{
        display.value = "Error";
    }
}

function log(){
    try{
        display.value = Math.log10(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

function ln(){
    try{
        display.value = Math.log(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
